name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, validate, and publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Verify package.json version matches tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$REF_NAME" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($REF_NAME)"
            exit 1
          fi

      - name: Packaging smoke check
        run: npm pack --dry-run --cache /tmp/cobuild-npm-cache

      - name: Verify package contents
        run: node scripts/verify-package-contents.mjs

      - name: Install smoke test
        run: bash scripts/smoke-test.sh

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$REF_NAME" &>/dev/null; then
            echo "Release $REF_NAME already exists — skipping creation."
          else
            gh release create "$REF_NAME" \
              --title "$REF_NAME" \
              --notes "See RELEASE_NOTES.md for details." \
              --verify-tag
          fi

      - name: Publish to npm
        run: npm publish --ignore-scripts --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
