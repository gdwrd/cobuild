name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, validate, and publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${{ github.ref_name }}" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag (${{ github.ref_name }})"
            exit 1
          fi

      - name: Packaging smoke check
        run: npm pack --dry-run --cache /tmp/cobuild-npm-cache

      - name: Verify package contents
        run: node scripts/verify-package-contents.mjs

      - name: Install smoke test
        run: bash scripts/smoke-test.sh

      - name: Publish to npm
        run: npm publish --ignore-scripts --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "See RELEASE_NOTES.md for details." \
            --verify-tag
